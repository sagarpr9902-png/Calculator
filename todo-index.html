<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>

            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="input-field" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button class="btn-add" onclick="addTodo()">Add Task</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" onclick="filterTodos('all')">All</button>
                <button class="filter-btn" onclick="filterTodos('active')">Active</button>
                <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
            </div>

            <div class="stats">
                <span><strong id="totalCount">0</strong> tasks</span>
                <span><strong id="activeCount">0</strong> active</span>
                <span><strong id="completedCount">0</strong> completed</span>
            </div>

            <ul id="todoList" class="todo-list">
                <!-- Todos will be added here dynamically -->
            </ul>

            <div class="empty-state" id="emptyState">
                <p>No tasks yet. Add one to get started!</p>
            </div>

            <div class="actions">
                <button class="btn-clear" onclick="clearCompleted()">Clear Completed</button>
                <button class="btn-delete-all" onclick="deleteAllTodos()">Delete All</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
